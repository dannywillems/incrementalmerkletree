# Builds the Lean 4 formalization in `formalization/`.
#
# Two tracks:
#   * core    - the Mathlib-free package (Layer 0 / Layer 1 model). Built on
#               both the `stable` and `beta` Lean release channels. Its in-file
#               `decide` oracle checks run as part of `lake build`.
#   * mathlib - the Mathlib-dependent package in `formalization/mathlib/`. Pinned
#               to the exact toolchain Mathlib requires (it cannot use the
#               channel matrix), built with the prebuilt Mathlib cache.
#
# Third-party actions are pinned to a commit SHA (tags are mutable); the trailing
# comment records the human-readable version.

name: Lean formalization

on: [push, pull_request]

permissions:
  contents: read

jobs:
  core:
    name: core / Lean ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Select Lean ${{ matrix.toolchain }}
        run: echo "leanprover/lean4:${{ matrix.toolchain }}" > formalization/lean-toolchain

      - name: Reject sorry
        working-directory: formalization
        run: if grep -rn 'sorry' Imt Imt.lean; then echo 'sorry found'; exit 1; fi

      - name: Build and run oracle checks
        working-directory: formalization
        run: lake build

  mathlib:
    name: mathlib track
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Mathlib oleans
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/mathlib
          key: mathlib-${{ hashFiles('formalization/mathlib/lake-manifest.json') }}

      - name: Reject sorry
        working-directory: formalization/mathlib
        run: if grep -rn 'sorry' ImtMathlib ImtMathlib.lean; then echo 'sorry found'; exit 1; fi

      - name: Get Mathlib cache
        working-directory: formalization/mathlib
        run: lake exe cache get

      - name: Build
        working-directory: formalization/mathlib
        run: lake build
